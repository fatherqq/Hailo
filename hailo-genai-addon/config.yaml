name: "Hailo GenAI Server"
version: "1.0.0"
slug: "hailo_genai"
description: "Hailo Model Zoo GenAI - Ollama-compatible API server for Hailo AI processors"
arch:
  - aarch64
  - amd64
startup: "application"
boot: "auto"
host_network: true
host_dbus: true
privileged: true
ports:
  8000/tcp: 8000
options:
  hailo_device: "/dev/hailo"
  model: "qwen2:1.5b"
  vdevice_group_id: "SHARED"
  open_webui: false
schema:
  hailo_device: "str"
  model: "str"
  vdevice_group_id: "str"
  open_webui: "bool"
