name: "Hailo Whisper"	 
version: "1.0.0"	 
slug: "hailo-whisper"
description: "基于 Hailo NPU（Hailo-8 / 8L / 10H）硬件加速的离线语音转写服务"
url: "https://github.com/fatherqq/Hailo"	 
arch:	 
  - aarch64	 
startup: services	 
boot: auto	 
restart: always	 
init: false	 
ports:
  10300/tcp: 10300
devices:	 
  - /dev/hailo0	 
map:	 
  - "media:rw"	 
  - "addon_config:rw"
full_access: false
privileged:	 
  - SYS_RAWIO	 
apparmor: true 
timeout: 300	 
map:	 
  - "media:rw"	 
  - "addon_config:rw"	 
  - "homeassistant_config:rw"	 
  - "ssl"	 

# Hailo 加速卡设备节点（需宿主机已加载 Hailo 内核驱动）
devices:
  - /dev/hailo0
map:	 
  - "media:rw"	 
  - "addon_config:rw"
privileged:
  - SYS_RAWIO
full_access: true
apparmor: false
# udev: true
options:
  hw_arch: "auto"
  model_variant: "base"
  language: "auto"
  model_auto_download: true
  vdevice_group_id: "HAILO_SHARED"
  multi_process_service: false
schema:
  hw_arch: select(auto|hailo8|hailo8l|hailo10h)
  model_variant: select(base|tiny|tiny.en)
  language: select(auto|zh|en)
  model_auto_download: bool
  vdevice_group_id: str
  multi_process_service: bool
