name: "Hailo Whisper"	 
version: "1.0.0"	 
slug: "Hailo Whisper"
description: "基于 Hailo NPU（Hailo-8 / 8L / 10H）硬件加速的离线语音转写服务"
url: "https://github.com/fatherqq/Hailo"	 
arch:	 
  - aarch64	 
startup: application	 
boot: auto	 
restart: always	 
init: false	 
ports:
  10300/tcp: 10300
devices:	 
  - /dev/hailo0	 
map:	 
  - "media:rw"	 
  - "addon_config:rw"
full_access: false
privileged:	 
  - SYS_RAWIO	 
apparmor: true
options:
  hw_arch: "auto"
  model_variant: "base"
  language: "auto"
  model_auto_download: true
  vdevice_group_id: "HAILO_SHARED"
  multi_process_service: false
schema:
  hw_arch: select(auto|hailo8|hailo8l|hailo10h)
  model_variant: select(base|tiny|tiny.en)
  language: select(auto|zh|en)
  model_auto_download: bool
  vdevice_group_id: str
  multi_process_service: bool
